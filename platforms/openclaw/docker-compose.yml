# platforms/openclaw/docker-compose.yml
# Cliosphere - OpenClaw Platform
# Run from: Cliosphere/platforms/openclaw/
# Requires: Ollama running on WSL2 host (wsl2-setup.sh)

version: '3.8'

services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: clio-openclaw:latest
    container_name: clio-openclaw
    restart: unless-stopped
    network_mode: "host"

    volumes:
      # Clio's brain — full Cliosphere repo
      - ../../:/workspaces/Cliosphere

      # OpenClaw config + gateway state
      - ${HOME}/.openclaw:/home/node/.openclaw

      # Persistent home for tool auth credentials
      # Survives container rebuilds — stores: ~/.claude/, ~/.config/gh/,
      # ~/.config/gemini/, ~/.config/mcp-server-gdrive/
      - clio-home:/home/node

    environment:
      # Workspace — OpenClaw reads Clio's files from here
      - OPENCLAW_WORKSPACE_DIR=/workspaces/Cliosphere/state

      # Ollama — from .env so host URL can change without editing compose
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}

      # Model routing — from .env
      - OPENCLAW_PRIMARY_MODEL=${OLLAMA_PRIMARY_MODEL}

      # API keys — from .env, never hardcoded
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # Gateway
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT:-18789}

      - OPENCLAW_DISABLE_BONJOUR=1

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  openclaw-cli:
    image: clio-openclaw:latest
    container_name: clio-openclaw-cli
    network_mode: "host"
    volumes:
      - ../../:/workspaces/Cliosphere
      - ${HOME}/.openclaw:/home/node/.openclaw
      - clio-home:/home/node
    entrypoint: ["node", "dist/index.js"]
    profiles: ["cli"]

volumes:
  # Named volume for Clio's tool credentials
  # Persists across: docker compose down, docker compose build, container restarts
  # Does NOT persist across: docker volume rm clio-home (full reset)
  clio-home:
    driver: local
